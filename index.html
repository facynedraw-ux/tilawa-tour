<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Tilawa Tour</title>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Tilawa Tour"/>
<meta name="theme-color" content="#6a5b53"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: {
      "headline": ["Noto Serif"],
      "body":     ["Plus Jakarta Sans"],
    }
  }}
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { font-family:'Plus Jakarta Sans',sans-serif; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.6s ease-out forwards; }
  .theme-card { transition: all 0.2s ease; cursor: pointer; }
  .theme-card:active { transform: scale(0.97); }
</style>
</head>
<body class="min-h-dvh bg-gradient-to-b from-amber-50 to-stone-100 flex flex-col items-center justify-center px-6 py-12">

<div class="w-full max-w-sm space-y-8 fade-in">

  <!-- Logo -->
  <div class="text-center space-y-2">
    <div class="w-16 h-16 mx-auto bg-stone-700 rounded-2xl flex items-center justify-center shadow-lg mb-4">
      <span class="material-symbols-outlined text-amber-100 text-3xl" style="font-variation-settings:'FILL' 1;">menu_book</span>
    </div>
    <h1 class="font-headline text-3xl font-bold text-stone-800 tracking-tight">Tilawa Tour</h1>
    <p class="text-sm text-stone-500 leading-relaxed">Cheminer avec le Coran, mois après mois.</p>
  </div>

  <!-- Sélection thème -->
  <div class="space-y-3">
    <p class="text-xs text-stone-400 uppercase tracking-widest text-center font-semibold">Choisissez votre thème</p>

    <!-- Bloom -->
    <div class="theme-card bg-white border-2 border-transparent rounded-2xl p-5 shadow-sm hover:border-stone-400 hover:shadow-md"
         onclick="choisirTheme('bloom')">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl flex-shrink-0" style="background:linear-gradient(135deg,#e9d5ca,#f0debc)"></div>
        <div>
          <p class="font-headline text-base font-bold text-stone-800">Bloom</p>
          <p class="text-xs text-stone-500 mt-0.5">Chaleureux · Tons terracotta et dorés</p>
        </div>
        <span class="material-symbols-outlined text-stone-300 ml-auto">chevron_right</span>
      </div>
    </div>

    <!-- Serenity -->
    <div class="theme-card bg-white border-2 border-transparent rounded-2xl p-5 shadow-sm hover:border-teal-400 hover:shadow-md"
         onclick="choisirTheme('serenity')">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl flex-shrink-0" style="background:linear-gradient(135deg,#b2dfdb,#fed65b)"></div>
        <div>
          <p class="font-headline text-base font-bold text-stone-800">Serenity</p>
          <p class="text-xs text-stone-500 mt-0.5">Apaisant · Tons émeraude et crème</p>
        </div>
        <span class="material-symbols-outlined text-stone-300 ml-auto">chevron_right</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <p class="text-center text-[10px] text-stone-400 uppercase tracking-widest">
    Proposé par JUMUA &amp; Me
  </p>

</div>

<script>
// Redirection automatique si thème déjà choisi
(function() {
  try {
    var prog = JSON.parse(localStorage.getItem('tilawa_programme') || '{}');
    if (prog.theme === 'serenity') {
      window.location.replace('dashboard_serenity_v4.html');
    } else if (prog.theme === 'bloom') {
      window.location.replace('dashboard_bloom_v4.html');
    }
  } catch(e) {}
})();

function choisirTheme(theme) {
  try {
    var prog = JSON.parse(localStorage.getItem('tilawa_programme') || '{}');
    prog.theme = theme;
    localStorage.setItem('tilawa_programme', JSON.stringify(prog));
  } catch(e) {}
  if (theme === 'serenity') {
    window.location.href = 'plan_serenity.html';
  } else {
    window.location.href = 'plan_bloom.html';
  }
}
</script>
</body>
</html>
